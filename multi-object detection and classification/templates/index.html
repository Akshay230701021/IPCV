 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Object Prediction System</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 2rem;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            width: 90%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .video-wrapper {
            flex: 2;
            min-width: 300px;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .stats-panel {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 600;
            color: #fff;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border-radius: 9999px;
            font-size: 0.75rem;
            margin-top: 1rem;
        }

        .footer {
            margin-top: auto;
            padding: 2rem;
            color: #64748b;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Intelligence Prediction System</h1>
        <p style="color: #64748b; margin-top: 0.5rem;">Multi-Object Detection & Analytics Dashboard</p>
    </header>

    <div class="container">
        <div class="video-wrapper">
            <div class="video-container">
                <img src="{{ url_for('video_feed') }}" alt="Real-time Analytics Stream">
            </div>
        </div>

        <div class="stats-panel">
            <div class="stat-card">
                <div class="stat-label">System Status</div>
                <div class="stat-value" style="color: #10b981;">Active</div>
                <div class="badge">Processing Real-time</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Model Engine</div>
                <div class="stat-value">MobileNet SSD</div>
                <div class="badge">Caffe Framework</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Inference Accuracy</div>
                <div class="stat-value">94.2%</div>
                <div class="badge">Optimized</div>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2024 AI Prediction Hub • Powered by OpenCV & Deep Learning
    </div>
</body>
</html>
